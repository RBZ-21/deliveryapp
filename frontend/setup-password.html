<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NodeRoute — Set Password</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { min-height: 100vh; background: #050d2a; display: flex; align-items: center; justify-content: center; font-family: 'Segoe UI', sans-serif; }
    .card { background: #0d1b3e; border: 1px solid rgba(255,107,53,0.2); border-radius: 16px; padding: 48px 40px; width: 100%; max-width: 420px; box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
    .logo-wrap { text-align: center; margin-bottom: 32px; }
    .logo-wrap img { height: 80px; }
    h2 { text-align: center; color: #fff; font-size: 1.4rem; margin-bottom: 8px; }
    .sub { text-align: center; color: #8899bb; font-size: 0.9rem; margin-bottom: 32px; }
    label { display: block; color: #ccd6f6; font-size: 0.85rem; margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; padding: 12px 16px; background: #0a1530; border: 1px solid #1e3a6e; border-radius: 8px; color: #fff; font-size: 1rem; margin-bottom: 20px; outline: none; transition: border-color .2s; }
    input:focus { border-color: #ff4620; }
    .btn { width: 100%; padding: 14px; background: linear-gradient(135deg, #ff4620, #e55a2b); color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; }
    .error { color: #ff4620; font-size: 0.85rem; margin-bottom: 16px; text-align: center; display: none; }
    .success { color: #4caf50; text-align: center; display: none; margin-top: 16px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap"><img src="NodeRoute_wbackground.svg" alt="NodeRoute"></div>
    <h2>Create Your Password</h2>
    <p class="sub">You've been invited to NodeRoute</p>
    <div class="error" id="err"></div>
    <form id="form">
      <label>New Password</label>
      <input type="password" id="pw" placeholder="Minimum 8 characters" required>
      <label>Confirm Password</label>
      <input type="password" id="pw2" placeholder="Repeat password" required>
      <button type="submit" class="btn">Create Account & Sign In</button>
    </form>
    <div class="success" id="ok">Account created! Redirecting…</div>
  </div>
  <script>
    const token = new URLSearchParams(window.location.search).get('token');
    if (!token) document.querySelector('.card').innerHTML = '<h2 style="color:#ff4620;text-align:center">Invalid invite link</h2><p style="color:#8899bb;text-align:center;margin-top:12px">Contact your manager for a new invite.</p>';
    document.getElementById('form') && document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const err = document.getElementById('err');
      err.style.display = 'none';
      const pw = document.getElementById('pw').value;
      const pw2 = document.getElementById('pw2').value;
      if (pw !== pw2) { err.textContent = 'Passwords do not match'; err.style.display = 'block'; return; }
      if (pw.length < 8) { err.textContent = 'Password must be at least 8 characters'; err.style.display = 'block'; return; }
      try {
        const r = await fetch('/auth/setup-password', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ token, password: pw }) });
        const d = await r.json();
        if (!r.ok) throw new Error(d.error);
        localStorage.setItem('nr_token', d.token);
        localStorage.setItem('nr_user', JSON.stringify(d.user));
        document.getElementById('ok').style.display = 'block';
        setTimeout(() => window.location.href = '/dashboard', 1200);
      } catch (e2) { err.textContent = e2.message; err.style.display = 'block'; }
    });
  </script>
</body>
</html>
