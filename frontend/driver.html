<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>Driver — NodeRoute</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070809;--surface:rgba(15,16,18,0.88);--border:rgba(255,255,255,0.08);
  --accent:#3dba7f;--warn:#f59e0b;--danger:#ef4444;
  --text:#fff;--muted:#8899bb;
  --tab-h:68px;--top-h:56px;
}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);position:relative;isolation:isolate}
body::before{content:'';position:fixed;inset:0;background:url('Best_Background.svg') center/cover no-repeat;opacity:.26;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;inset:0;background:linear-gradient(180deg,rgba(7,8,9,.56),rgba(7,8,9,.82));pointer-events:none;z-index:0}
body > *{position:relative;z-index:1}

/* ── LOGIN ── */
#loginScreen{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px}
.login-card{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:36px 28px;width:100%;max-width:380px;text-align:center}
.login-logo-img{display:block;width:min(280px,100%);height:auto;margin:0 auto 10px}
.login-logo{font-size:20px;font-weight:800;color:var(--accent);margin-bottom:4px}
.login-logo span{color:var(--text)}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px}
.login-lbl{display:block;text-align:left;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.4px}
.login-inp{width:100%;padding:12px 14px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-size:15px;font-family:'Inter',sans-serif;outline:none;margin-bottom:14px;transition:.2s}
.login-inp:focus{border-color:var(--accent)}
.login-btn{width:100%;padding:14px;background:var(--accent);color:#050d2a;border:none;border-radius:10px;font-size:15px;font-weight:700;font-family:'Inter',sans-serif;cursor:pointer}
.login-btn:disabled{opacity:.6}
.login-err{background:rgba(239,68,68,.1);color:#fca5a5;border-radius:8px;padding:10px;font-size:13px;margin-bottom:14px;display:none}
.login-err.show{display:block}

/* ── APP SHELL ── */
#app{display:none;height:100%;flex-direction:column}

/* Top bar */
.topbar{height:var(--top-h);background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar-brand img{display:block;width:min(200px,42vw);height:auto}
.topbar-brand{font-size:15px;font-weight:800;color:var(--accent)}
.topbar-brand span{color:var(--text)}
.driver-name{font-size:13px;color:var(--muted);font-weight:500}
.driver-meta{display:flex;flex-direction:column;gap:3px}
.location-status{font-size:11px;font-weight:600}
.location-status.ok{color:var(--accent)}
.location-status.warn{color:var(--warn)}
.location-status.err{color:#fca5a5}
.route-select{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:8px;padding:6px 10px;font-size:13px;font-family:'Inter',sans-serif;outline:none;max-width:180px}
.logout-btn{background:none;border:1px solid var(--border);color:var(--muted);padding:5px 12px;border-radius:7px;font-size:12px;font-family:'Inter',sans-serif;cursor:pointer}

/* Content area */
.content{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* Bottom tab bar */
.tabbar{height:var(--tab-h);background:var(--surface);border-top:1px solid var(--border);display:flex;flex-shrink:0;padding-bottom:env(safe-area-inset-bottom)}
.tab-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border:none;background:transparent;color:var(--muted);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent;padding:8px 0}
.tab-item.active{color:var(--accent)}
.tab-icon{font-size:22px;line-height:1}

/* ── PANELS ── */
.panel{display:none;padding:16px;padding-bottom:20px}
.panel.active{display:block}

/* ── ROUTE PANEL ── */
.route-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:8px}
.route-title{font-size:17px;font-weight:700}
.route-meta{font-size:12px;color:var(--muted)}
.progress-bar-wrap{background:var(--border);border-radius:4px;height:6px;margin-bottom:20px;overflow:hidden}
.progress-bar-fill{height:100%;background:var(--accent);border-radius:4px;transition:.4s}

.stop-list{display:flex;flex-direction:column;gap:10px}
.stop-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px 16px;position:relative;transition:.2s;backdrop-filter:blur(10px)}
.stop-card.done{opacity:.55;border-color:rgba(61,186,127,.2)}
.stop-card.active-stop{border-color:var(--warn);box-shadow:0 0 0 1px var(--warn)}
.stop-card.done .stop-name{text-decoration:line-through;color:var(--muted)}

.stop-row1{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.stop-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;background:var(--border);color:var(--muted)}
.stop-card.active-stop .stop-num{background:var(--warn);color:#050d2a}
.stop-card.done .stop-num{background:rgba(61,186,127,.15);color:var(--accent)}
.stop-num-check{font-size:14px}
.stop-name{font-weight:600;font-size:14px;flex:1}
.stop-address{font-size:12px;color:var(--muted);margin-bottom:8px;padding-left:38px}

.stop-door{display:flex;align-items:center;gap:8px;padding:8px 12px;background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);border-radius:8px;margin-bottom:10px;margin-left:38px}
.stop-door-icon{font-size:16px;flex-shrink:0}
.stop-door-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;flex-shrink:0}
.stop-door-code{font-size:18px;font-weight:800;letter-spacing:3px;color:var(--warn);font-variant-numeric:tabular-nums}

.stop-notes-text{font-size:12px;color:var(--muted);padding-left:38px;margin-bottom:10px;font-style:italic;line-height:1.5}

.stop-actions{display:flex;gap:8px;padding-left:38px;flex-wrap:wrap}
.stop-btn{padding:8px 16px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;border:none;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.btn-arrive{background:rgba(245,158,11,.15);color:var(--warn);border:1px solid rgba(245,158,11,.3)}
.btn-arrive:active{background:rgba(245,158,11,.25)}
.btn-depart{background:rgba(61,186,127,.15);color:var(--accent);border:1px solid rgba(61,186,127,.3)}
.btn-depart:active{background:rgba(61,186,127,.25)}
.btn-done-label{font-size:12px;color:var(--accent);font-weight:600}

/* ── ANALYTICS PANEL ── */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px}
.stat-tile{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 16px;backdrop-filter:blur(10px)}
.stat-tile-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.stat-tile-value{font-size:30px;font-weight:800}
.stat-tile-value.green{color:var(--accent)}
.stat-tile-value.amber{color:var(--warn)}
.stat-tile-sub{font-size:11px;color:var(--muted);margin-top:4px}

.section-label{font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px}
.driver-perf-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:16px;backdrop-filter:blur(10px)}
.perf-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px}
.perf-row:last-child{border-bottom:none}
.perf-label{color:var(--muted)}
.perf-val{font-weight:600}

/* ── NOTES PANEL ── */
.notes-hero{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:16px;backdrop-filter:blur(10px)}
.notes-stop-label{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:6px}
.notes-stop-name{font-size:20px;font-weight:700;margin-bottom:4px}
.notes-stop-addr{font-size:13px;color:var(--muted);margin-bottom:16px}

.door-code-display{background:rgba(245,158,11,.06);border:2px solid rgba(245,158,11,.25);border-radius:14px;padding:20px;text-align:center;margin-bottom:16px}
.door-code-title{font-size:11px;text-transform:uppercase;letter-spacing:.7px;color:var(--warn);margin-bottom:10px;font-weight:600}
.door-code-digits{font-size:44px;font-weight:800;letter-spacing:8px;color:#fff;font-variant-numeric:tabular-nums;line-height:1}
.door-code-none{font-size:14px;color:var(--muted);padding:20px 0}
.copy-btn{margin-top:14px;background:rgba(245,158,11,.12);border:1px solid rgba(245,158,11,.3);color:var(--warn);padding:8px 20px;border-radius:8px;font-size:13px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer}
.copy-btn:active{background:rgba(245,158,11,.22)}

.signature-guard{margin-top:10px;padding:10px 12px;border-radius:10px;background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2);color:#fca5a5;font-size:12px;line-height:1.5}
.signature-ok{margin-top:10px;padding:10px 12px;border-radius:10px;background:rgba(61,186,127,.08);border:1px solid rgba(61,186,127,.18);color:var(--accent);font-size:12px;line-height:1.5}
.btn-signature{background:rgba(59,130,246,.15);color:#93c5fd;border:1px solid rgba(59,130,246,.3)}
.btn-signature:active{background:rgba(59,130,246,.24)}

.notes-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;backdrop-filter:blur(10px)}
.notes-card-title{font-size:12px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:10px;font-weight:600}
.notes-text{font-size:15px;line-height:1.7;color:var(--text)}
.notes-empty{font-size:14px;color:var(--muted);font-style:italic}

/* ── MISC ── */
.empty-state{text-align:center;padding:60px 20px;color:var(--muted)}
.empty-state-icon{font-size:44px;margin-bottom:14px}
.empty-state h3{font-size:16px;color:var(--text);margin-bottom:6px}
.spinner{width:32px;height:32px;border:3px solid rgba(61,186,127,.2);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;margin:60px auto}
@keyframes spin{to{transform:rotate(360deg)}}
.toast{position:fixed;bottom:calc(var(--tab-h) + 12px);left:50%;transform:translateX(-50%);background:#1e3a6e;border:1px solid var(--accent);color:var(--text);padding:10px 20px;border-radius:10px;font-size:13px;font-weight:600;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
</style>
</head>
<body>

<!-- ── LOGIN ── -->
<div id="loginScreen">
  <div class="login-card">
    <img src="For_Light_Theme_Transparent.svg" class="login-logo-img" alt="NodeRoute Driver"/>
    <div class="login-sub">Sign in to view your route</div>
    <div id="loginErr" class="login-err"></div>
    <label class="login-lbl">Email</label>
    <input id="loginEmail" class="login-inp" type="email" placeholder="you@noderoute.com" autocomplete="email"/>
    <label class="login-lbl">Password</label>
    <input id="loginPw" class="login-inp" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <button id="loginBtn" class="login-btn" onclick="doLogin()">Sign In</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">

  <!-- Top bar -->
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <div class="topbar-brand"><img src="For_Light_Theme_Transparent.svg" alt="NodeRoute Driver"/></div>
        <div class="driver-meta">
          <div class="driver-name" id="driverNameDisplay"></div>
          <div class="location-status" id="locationStatus">Location sync idle</div>
        </div>
      </div>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <select id="routeSelect" class="route-select" onchange="selectRoute(this.value)" style="display:none"></select>
      <button class="logout-btn" onclick="doLogout()">Out</button>
    </div>
  </div>

  <!-- Content panels -->
  <div class="content">

    <!-- Route panel -->
    <div id="panelRoute" class="panel active">
      <div id="routeContent"><div class="spinner"></div></div>
    </div>

    <!-- Analytics panel -->
    <div id="panelAnalytics" class="panel">
      <div id="analyticsContent"><div class="spinner"></div></div>
    </div>

    <!-- Notes panel -->
    <div id="panelNotes" class="panel">
      <div id="notesContent"><div class="spinner"></div></div>
    </div>

    <!-- Invoices panel -->
    <div id="panelInvoices" class="panel">
      <div id="invoicesContent"><div class="spinner"></div></div>
    </div>

  </div><!-- /content -->

  <!-- Bottom tab bar -->
  <div class="tabbar">
    <button class="tab-item active" id="tabRoute"     onclick="showTab('Route')">
      <span class="tab-icon">🗺️</span>Route
    </button>
    <button class="tab-item"        id="tabAnalytics" onclick="showTab('Analytics')">
      <span class="tab-icon">📊</span>Analytics
    </button>
    <button class="tab-item"        id="tabNotes"     onclick="showTab('Notes')">
      <span class="tab-icon">📝</span>Notes
    </button>
    <button class="tab-item"        id="tabInvoices"  onclick="showTab('Invoices')">
      <span class="tab-icon">🧾</span>Invoices
    </button>
  </div>

</div><!-- /app -->

<div id="signatureModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;align-items:center;justify-content:center;padding:18px">
  <div style="background:var(--surface);border-radius:16px;padding:24px;width:min(96vw,560px);border:1px solid var(--border)">
    <h3 style="margin-bottom:4px;font-size:18px">Capture Customer Signature</h3>
    <p id="signatureModalSub" style="font-size:12px;color:var(--muted);margin-bottom:14px">Sign to complete this delivery stop.</p>
    <div style="border:2px dashed var(--border);border-radius:10px;background:var(--bg);margin-bottom:12px;position:relative">
      <canvas id="sigCanvas" style="width:100%;height:200px;display:block;touch-action:none;border-radius:8px;cursor:crosshair"></canvas>
      <div id="sigHint" style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:13px;pointer-events:none">Customer signs here</div>
    </div>
    <div style="display:flex;gap:10px;justify-content:flex-end">
      <button class="logout-btn" style="padding:9px 16px" onclick="clearSignature()">Clear</button>
      <button class="logout-btn" style="padding:9px 16px" onclick="closeSignatureModal()">Cancel</button>
      <button class="stop-btn btn-signature" id="signatureSubmitBtn" onclick="submitStopSignature()">Save Signature</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
let driverToken = null;
let driverUser  = null;
let allRoutes   = [];
let activeRoute = null;
let stopState   = {}; // stopId → 'arrived' | 'departed'
let dwellState  = [];
let locationWatchId = null;
let lastLocationSignature = '';
let locationStatus = { text: 'Location sync idle', tone: '' };
let companyPrefs = { forceDriverSignature: false };
let activeSignatureStopId = null;
let sigDrawing = false;
let sigHasData = false;
let driverInvoices = [];

// ── AUTH ─────────────────────────────────────────────────────────────────────
function ah() { return { headers: { Authorization: 'Bearer ' + driverToken, 'Content-Type': 'application/json' } }; }

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pw    = document.getElementById('loginPw').value;
  if (!email || !pw) return showErr('Email and password required.');
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Signing in…';
  clearErr();
  try {
    const res  = await fetch('/auth/login', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ email, password: pw }) });
    const data = await res.json();
    if (!res.ok) { showErr(data.error || 'Login failed.'); return; }
    if (!data.user || data.user.role !== 'driver') {
      showErr('This login is for drivers only.');
      driverToken = null;
      driverUser = null;
      sessionStorage.removeItem('drv_token');
      sessionStorage.removeItem('drv_user');
      return;
    }
    driverToken = data.token;
    driverUser  = data.user;
    sessionStorage.setItem('drv_token', driverToken);
    sessionStorage.setItem('drv_user',  JSON.stringify(driverUser));
    localStorage.setItem('nr_token', driverToken);
    localStorage.setItem('nr_user', JSON.stringify(driverUser));
    enterApp();
  } catch { showErr('Could not reach server.'); }
  finally   { btn.disabled = false; btn.textContent = 'Sign In'; }
}

function doLogout() {
  stopLocationSharing();
  driverToken = null; driverUser = null; allRoutes = []; activeRoute = null; stopState = {}; dwellState = [];
  sessionStorage.removeItem('drv_token'); sessionStorage.removeItem('drv_user');
  localStorage.removeItem('nr_token');
  localStorage.removeItem('nr_user');
  document.getElementById('app').style.display        = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('loginPw').value = '';
  setLocationStatus('Location sync idle', '');
}

function showErr(m) { const e=document.getElementById('loginErr'); e.textContent=m; e.classList.add('show'); }
function clearErr()  { document.getElementById('loginErr').classList.remove('show'); }
['loginEmail','loginPw'].forEach(id => document.getElementById(id).addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); }));

// ── ENTER APP ────────────────────────────────────────────────────────────────
function enterApp() {
  document.getElementById('loginScreen').style.display  = 'none';
  document.getElementById('app').style.display          = 'flex';
  document.getElementById('driverNameDisplay').textContent = driverUser.name || driverUser.email;
  setLocationStatus('Starting location sync…', 'warn');
  startLocationSharing();
  loadCompanyPrefs();
  loadRoutes();
}

async function loadCompanyPrefs() {
  try {
    const res = await fetch('/api/settings/company', ah());
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    if (!res.ok) return;
    companyPrefs = { forceDriverSignature: !!data.forceDriverSignature };
    renderRoute();
    renderNotes();
  } catch {}
}

function startLocationSharing() {
  if (!navigator.geolocation) {
    setLocationStatus('Location sharing unavailable in this browser', 'err');
    return;
  }
  if (locationWatchId !== null) return;
  locationWatchId = navigator.geolocation.watchPosition(
    (position) => sendLocationUpdate(position.coords),
    () => setLocationStatus('Location permission blocked', 'err'),
    { enableHighAccuracy: true, maximumAge: 15000, timeout: 10000 }
  );
}

function stopLocationSharing() {
  if (locationWatchId !== null && navigator.geolocation) {
    navigator.geolocation.clearWatch(locationWatchId);
  }
  locationWatchId = null;
  lastLocationSignature = '';
  setLocationStatus('Location sync stopped', '');
}

async function sendLocationUpdate(coords) {
  if (!driverToken || !coords) return;

  const payload = {
    lat: Number(coords.latitude.toFixed(6)),
    lng: Number(coords.longitude.toFixed(6)),
    heading: Number.isFinite(coords.heading) ? Number(coords.heading.toFixed(1)) : 0,
    speed_mph: Number.isFinite(coords.speed) && coords.speed >= 0
      ? Number((coords.speed * 2.23694).toFixed(1))
      : 0,
  };
  const signature = `${payload.lat}:${payload.lng}:${payload.heading}:${payload.speed_mph}`;
  if (signature === lastLocationSignature) return;
  lastLocationSignature = signature;
  setLocationStatus('Syncing location…', 'warn');

  try {
    const res = await fetch('/api/driver/location', {
      method: 'PATCH',
      ...ah(),
      body: JSON.stringify(payload),
    });
    if (!res.ok) {
      setLocationStatus('Location sync unavailable', 'err');
      return;
    }
    setLocationStatus(`Live at ${payload.lat.toFixed(3)}, ${payload.lng.toFixed(3)}`, 'ok');
  } catch {
    setLocationStatus('Location sync unavailable', 'err');
  }
}

// ── TABS ─────────────────────────────────────────────────────────────────────
function showTab(tab) {
  ['Route','Analytics','Notes','Invoices'].forEach(t => {
    document.getElementById('panel'+t).classList.toggle('active', t===tab);
    document.getElementById('tab'+t).classList.toggle('active', t===tab);
  });
  if (tab === 'Analytics') renderAnalytics();
  if (tab === 'Notes')     renderNotes();
  if (tab === 'Invoices')  renderInvoices();
}

// ── ROUTES ───────────────────────────────────────────────────────────────────
async function loadRoutes() {
  try {
    const [routesRes, dwellRes] = await Promise.all([
      fetch('/api/driver/routes', ah()),
      fetch('/api/dwell', ah()),
    ]);
    const res = routesRes;
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    dwellState = dwellRes.ok ? await dwellRes.json() : [];
    allRoutes  = Array.isArray(data) ? data : [];
    hydrateStopState();
    populateRouteSelect();
    if (allRoutes.length) selectRoute(allRoutes[0].id);
    else renderEmptyRoute();
  } catch {
    document.getElementById('routeContent').innerHTML = errHtml('Could not load routes');
  }
}

async function loadInvoices() {
  try {
    const res = await fetch('/api/driver/invoices', ah());
    if (res.status === 401) { doLogout(); return []; }
    if (!res.ok) return [];
    return await res.json();
  } catch {
    return [];
  }
}

async function renderInvoices() {
  const el = document.getElementById('invoicesContent');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    driverInvoices = await loadInvoices();
    if (!driverInvoices.length) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🧾</div>
          <h3>No invoices assigned</h3>
          <p>Invoices will appear here when they are linked to your route stops.</p>
        </div>`;
      return;
    }

    el.innerHTML = `
      <div class="section-label">Invoices on Your Routes</div>
      <div style="display:flex;flex-direction:column;gap:12px">
        ${driverInvoices.map((inv) => `
          <div class="notes-hero" style="margin-bottom:0">
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:flex-start;flex-wrap:wrap">
              <div>
                <div class="notes-stop-label">${inv.route_name || 'Assigned Route'}${inv.stop_name ? ` · ${esc(inv.stop_name)}` : ''}</div>
                <div class="notes-stop-name">${esc(inv.invoice_number || inv.id.slice(0, 8).toUpperCase())}</div>
                <div class="notes-stop-addr">${esc(inv.customer_name || 'Customer')} · ${esc(inv.customer_address || '—')}</div>
              </div>
              <div class="btn-done-label">${inv.invoice_status || 'pending'}</div>
            </div>
            <div style="display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:wrap;margin-top:12px">
              <div style="color:var(--muted);font-size:13px">
                Total: <strong style="color:var(--text)">$${Number(inv.total || 0).toFixed(2)}</strong>
                ${inv.invoice_signed_at ? ` · Signed ${new Date(inv.invoice_signed_at).toLocaleString()}` : ''}
              </div>
              <div style="display:flex;gap:8px;flex-wrap:wrap">
                <button class="stop-btn btn-signature" onclick="openInvoicePdf('${inv.id}')">Open PDF</button>
              </div>
            </div>
          </div>
        `).join('')}
      </div>`;
  } catch {
    el.innerHTML = errHtml('Could not load invoices');
  }
}

async function openInvoicePdf(invoiceId) {
  try {
    const res = await fetch(`/api/invoices/${encodeURIComponent(invoiceId)}/pdf`, ah());
    if (res.status === 401) { doLogout(); return; }
    if (!res.ok) throw new Error('Could not open invoice PDF');
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `invoice-${invoiceId}.pdf`;
    a.click();
    URL.revokeObjectURL(url);
  } catch (error) {
    showToast(error.message || 'Could not open invoice PDF');
  }
}

function hydrateStopState() {
  const nextState = {};
  (Array.isArray(dwellState) ? dwellState : []).forEach(record => {
    if (!record || !record.stopId) return;
    nextState[record.stopId] = record.departedAt ? 'departed' : 'arrived';
  });
  stopState = nextState;
}

function populateRouteSelect() {
  const sel = document.getElementById('routeSelect');
  if (allRoutes.length <= 1) { sel.style.display = 'none'; return; }
  sel.style.display = 'block';
  sel.innerHTML = allRoutes.map(r => `<option value="${r.id}">${esc(r.name)}</option>`).join('');
}

function selectRoute(id) {
  activeRoute = allRoutes.find(r => r.id === id) || allRoutes[0] || null;
  document.getElementById('routeSelect').value = activeRoute ? activeRoute.id : '';
  renderRoute();
}

function renderEmptyRoute() {
  document.getElementById('routeContent').innerHTML = `
    <div class="empty-state">
      <div class="empty-state-icon">🗺️</div>
      <h3>No routes assigned</h3>
      <p>Your dispatcher hasn't assigned a route yet.</p>
    </div>`;
}

function renderRoute() {
  if (!activeRoute) { renderEmptyRoute(); return; }
  const stops   = activeRoute.stops || [];
  const done    = stops.filter(s => stopState[s.id] === 'departed').length;
  const pct     = stops.length ? Math.round((done / stops.length) * 100) : 0;

  let html = `
    <div class="route-header">
      <div>
        <div class="route-title">${esc(activeRoute.name)}</div>
        <div class="route-meta">${stops.length} stop${stops.length!==1?'s':''} · ${done} completed</div>
      </div>
    </div>
    <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    <div class="stop-list">`;

  if (!stops.length) {
    html += `<div class="empty-state"><div class="empty-state-icon">📍</div><h3>No stops on this route</h3></div>`;
  } else {
    stops.forEach(stop => {
      const state    = stopState[stop.id] || 'pending';
      const isDone   = state === 'departed';
      const isActive = state === 'arrived';
      const cls      = isDone ? 'done' : (isActive ? 'active-stop' : '');

      let numHtml = isDone
        ? `<span class="stop-num-check">✓</span>`
        : stop.position;

      let actionsHtml = '';
      if (isDone) {
        actionsHtml = `<div class="stop-actions"><span class="btn-done-label">✓ Completed</span></div>`;
      } else if (isActive) {
        actionsHtml = `<div class="stop-actions">
          ${stop.invoice_id ? `<button class="stop-btn btn-signature" onclick="openSignatureModal('${stop.id}')">${stop.invoice_has_signature ? 'View Signed Delivery' : 'Capture Signature'}</button>` : ''}
          <button class="stop-btn btn-depart" onclick="markDepart('${stop.id}','${activeRoute.id}')">Depart ✓</button>
        </div>`;
      } else {
        actionsHtml = `<div class="stop-actions">
          <button class="stop-btn btn-arrive" onclick="markArrive('${stop.id}','${activeRoute.id}')">Arrive</button>
        </div>`;
      }

      const signatureStatus = companyPrefs.forceDriverSignature
        ? stop.invoice_has_signature
          ? `<div class="signature-ok">Signature captured. Driver can complete this stop.</div>`
          : `<div class="signature-guard">Signature required before the driver can move to the next field.</div>`
        : '';

      html += `
        <div class="stop-card ${cls}" id="sc-${stop.id}">
          <div class="stop-row1">
            <div class="stop-num">${numHtml}</div>
            <div class="stop-name">${esc(stop.name || 'Stop ' + stop.position)}</div>
          </div>
          <div class="stop-address">${esc(stop.address || '')}</div>
          ${stop.door_code ? `
          <div class="stop-door">
            <span class="stop-door-icon">🔑</span>
            <span class="stop-door-label">Code</span>
            <span class="stop-door-code">${esc(stop.door_code)}</span>
          </div>` : ''}
          ${stop.notes ? `<div class="stop-notes-text">${esc(stop.notes)}</div>` : ''}
          ${signatureStatus}
          ${actionsHtml}
        </div>`;
    });
  }
  html += '</div>';
  document.getElementById('routeContent').innerHTML = html;
}

async function markArrive(stopId, routeId) {
  const previous = stopState[stopId];
  stopState[stopId] = 'arrived';
  renderRoute();
  renderNotes();
  try {
    const res = await fetch(`/api/stops/${stopId}/arrive`, { method:'POST', ...ah(), body: JSON.stringify({ routeId }) });
    if (!res.ok) throw new Error('arrive failed');
    const record = await res.json();
    mergeDwellRecord(record);
    hydrateStopState();
    renderRoute();
    renderNotes();
    showToast('Arrived at stop');
  } catch {
    if (previous) stopState[stopId] = previous;
    else delete stopState[stopId];
    showToast('Could not sync arrival right now');
    renderRoute();
    renderNotes();
  }
}

async function markDepart(stopId, routeId) {
  const stop = findStopById(stopId);
  if (companyPrefs.forceDriverSignature) {
    if (!stop?.invoice_id) {
      showToast('Signature is required, but no invoice is attached to this stop yet');
      return;
    }
    if (!stop.invoice_has_signature) {
      openSignatureModal(stopId);
      showToast('Capture a customer signature before departing');
      return;
    }
  }
  const previous = stopState[stopId];
  stopState[stopId] = 'departed';
  renderRoute();
  renderNotes();
  try {
    const res = await fetch(`/api/stops/${stopId}/depart`, { method:'POST', ...ah(), body: JSON.stringify({ routeId }) });
    if (!res.ok) throw new Error('depart failed');
    const record = await res.json();
    mergeDwellRecord(record);
    hydrateStopState();
    renderRoute();
    renderNotes();
    showToast('Stop completed ✓');
  } catch {
    if (previous) stopState[stopId] = previous;
    else delete stopState[stopId];
    showToast('Could not sync departure right now');
    renderRoute();
    renderNotes();
  }
}

function mergeDwellRecord(record) {
  if (!record || !record.id) return;
  const index = dwellState.findIndex(item => item.id === record.id);
  if (index >= 0) dwellState[index] = record;
  else dwellState.push(record);
}

// ── ANALYTICS ────────────────────────────────────────────────────────────────

  const el = document.getElementById('analyticsContent');
  el.innerHTML = '<div class="spinner"></div>';
  try {
    const res = await fetch('/api/driver/summary', ah());

    const me = res.ok ? await res.json() : {};

    const stops   = activeRoute ? (activeRoute.stops || []) : [];
    const done    = stops.filter(s => stopState[s.id] === 'departed').length;

    el.innerHTML = `
      <div class="stats-grid">
        <div class="stat-tile">
          <div class="stat-tile-label">On-Time Rate</div>
          <div class="stat-tile-value ${(me.onTimeRate||100)>=90?'green':'amber'}">${me.onTimeRate ?? '—'}%</div>
          <div class="stat-tile-sub">This period</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-label">Stops Done</div>
          <div class="stat-tile-value green">${done}</div>
          <div class="stat-tile-sub">of ${stops.length} today</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-label">Miles Today</div>
          <div class="stat-tile-value">${me.milesToday ?? '—'}</div>
          <div class="stat-tile-sub">miles</div>
        </div>
        <div class="stat-tile">
          <div class="stat-tile-label">Avg Stop</div>
          <div class="stat-tile-value">${me.avgStopMinutes ?? '—'}</div>
          <div class="stat-tile-sub">minutes</div>
        </div>
      </div>
      <div class="section-label">Your Performance</div>
      <div class="driver-perf-card">
        <div class="perf-row"><span class="perf-label">Total stops (period)</span><span class="perf-val">${me.totalStopsToday ?? '—'}</span></div>
        <div class="perf-row"><span class="perf-label">Avg speed</span><span class="perf-val">${me.avgSpeedMph ?? '—'} mph</span></div>
        <div class="perf-row"><span class="perf-label">Status</span><span class="perf-val" style="color:var(--accent)">${me.status === 'on-duty' ? 'On Duty' : 'Off Duty'}</span></div>
        <div class="perf-row"><span class="perf-label">Vehicle</span><span class="perf-val">${me.vehicleId ?? '—'}</span></div>
      </div>`;
  } catch {
    el.innerHTML = errHtml('Could not load analytics');
  }
}

// ── NOTES ────────────────────────────────────────────────────────────────────
function renderNotes() {
  const el    = document.getElementById('notesContent');
  const stops = activeRoute ? (activeRoute.stops || []) : [];

  // Find the current stop (arrived but not departed), then the next pending
  const current = stops.find(s => stopState[s.id] === 'arrived')
    || stops.find(s => !stopState[s.id] || stopState[s.id] === 'pending');

  if (!current) {
    if (stops.length && stops.every(s => stopState[s.id] === 'departed')) {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🎉</div>
          <h3>Route complete!</h3>
          <p>All stops have been completed.</p>
        </div>`;
    } else {
      el.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">📝</div>
          <h3>No active stop</h3>
          <p>Notes for your next stop will appear here.</p>
        </div>`;
    }
    return;
  }

  const isActive = stopState[current.id] === 'arrived';
  const label    = isActive ? 'Current Stop' : 'Next Stop';

  el.innerHTML = `
    <div class="notes-hero">
      <div class="notes-stop-label">${label} · Stop ${current.position}</div>
      <div class="notes-stop-name">${esc(current.name || 'Stop ' + current.position)}</div>
      <div class="notes-stop-addr">${esc(current.address || '')}</div>
      ${current.invoice_id ? `<button class="stop-btn btn-signature" style="font-size:14px;padding:10px 20px;margin-right:10px" onclick="openSignatureModal('${current.id}')">${current.invoice_has_signature ? 'Signed Delivery' : 'Capture Signature'}</button>` : ''}
      ${isActive
        ? `<button class="stop-btn btn-depart" style="font-size:14px;padding:10px 20px" onclick="markDepart('${current.id}','${activeRoute ? activeRoute.id : ''}')">Mark Departed ✓</button>`
        : `<button class="stop-btn btn-arrive" style="font-size:14px;padding:10px 20px" onclick="markArrive('${current.id}','${activeRoute ? activeRoute.id : ''}')">Mark Arrived</button>`
      }
    </div>

    ${companyPrefs.forceDriverSignature
      ? current.invoice_has_signature
        ? `<div class="signature-ok" style="margin-bottom:16px">Signature captured for this stop.</div>`
        : `<div class="signature-guard" style="margin-bottom:16px">Signature required before the driver can move to the next field.</div>`
      : ''
    }

    <div class="door-code-display">
      <div class="door-code-title">🔑 Door / Access Code</div>
      ${current.door_code
        ? `<div class="door-code-digits" id="dcDigits">${esc(current.door_code)}</div>
           <button class="copy-btn" onclick="copyCode('${esc(current.door_code)}')">Copy Code</button>`
        : `<div class="door-code-none">No door code on file</div>`
      }
    </div>

    <div class="notes-card">
      <div class="notes-card-title">📝 Stop Notes</div>
      ${current.notes
        ? `<div class="notes-text">${esc(current.notes)}</div>`
        : `<div class="notes-empty">No notes for this stop.</div>`
      }
    </div>`;
}

function copyCode(code) {
  navigator.clipboard.writeText(code).then(() => showToast('Code copied!')).catch(() => {
    // Fallback for older browsers
    const el = document.getElementById('dcDigits');
    if (el) { const r=document.createRange(); r.selectNode(el); window.getSelection().removeAllRanges(); window.getSelection().addRange(r); }
    showToast('Select the code to copy');
  });
}

// ── HELPERS ──────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function errHtml(m) {
  return `<div class="empty-state"><div class="empty-state-icon">⚠️</div><h3>${m}</h3></div>`;
}

function findStopById(stopId) {
  if (!activeRoute) return null;
  return (activeRoute.stops || []).find((stop) => stop.id === stopId) || null;
}

function openSignatureModal(stopId) {
  const stop = findStopById(stopId);
  if (!stop?.invoice_id) {
    showToast('No invoice is attached to this stop yet');
    return;
  }
  activeSignatureStopId = stopId;
  sigHasData = false;
  const sub = document.getElementById('signatureModalSub');
  if (sub) {
    sub.textContent = `Sign for ${stop.name || 'this stop'}${stop.invoice_number ? ` · Invoice ${stop.invoice_number}` : ''}.`;
  }
  document.getElementById('signatureModal').style.display = 'flex';
  requestAnimationFrame(initSigCanvas);
}

function closeSignatureModal() {
  document.getElementById('signatureModal').style.display = 'none';
  activeSignatureStopId = null;
  sigHasData = false;
}

function initSigCanvas() {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas) return;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * window.devicePixelRatio;
  canvas.height = rect.height * window.devicePixelRatio;
  const ctx = canvas.getContext('2d');
  ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
  ctx.clearRect(0, 0, rect.width, rect.height);
  ctx.lineWidth = 2.5;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.strokeStyle = '#ffffff';
  const hint = document.getElementById('sigHint');
  if (hint) hint.style.display = 'flex';
}

function sigPoint(event) {
  const canvas = document.getElementById('sigCanvas');
  const rect = canvas.getBoundingClientRect();
  const point = event.touches && event.touches[0] ? event.touches[0] : event;
  return { x: point.clientX - rect.left, y: point.clientY - rect.top };
}

function sigStart(event) {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas) return;
  event.preventDefault();
  sigDrawing = true;
  const ctx = canvas.getContext('2d');
  const point = sigPoint(event);
  ctx.beginPath();
  ctx.moveTo(point.x, point.y);
  sigHasData = true;
  const hint = document.getElementById('sigHint');
  if (hint) hint.style.display = 'none';
}

function sigMove(event) {
  if (!sigDrawing) return;
  event.preventDefault();
  const canvas = document.getElementById('sigCanvas');
  const ctx = canvas.getContext('2d');
  const point = sigPoint(event);
  ctx.lineTo(point.x, point.y);
  ctx.stroke();
}

function sigEnd(event) {
  if (event) event.preventDefault();
  sigDrawing = false;
}

function clearSignature() {
  initSigCanvas();
  sigHasData = false;
}

function updateStopSignature(stopId, invoicePatch = {}) {
  for (const route of allRoutes) {
    route.stops = (route.stops || []).map((stop) => {
      if (stop.id !== stopId) return stop;
      return {
        ...stop,
        ...invoicePatch,
      };
    });
  }
  if (activeRoute) {
    activeRoute = allRoutes.find((route) => route.id === activeRoute.id) || activeRoute;
  }
}

async function submitStopSignature() {
  if (!sigHasData) {
    showToast('Please capture a signature first');
    return;
  }
  const stop = findStopById(activeSignatureStopId);
  if (!stop?.invoice_id) {
    showToast('No invoice is attached to this stop');
    return;
  }

  const btn = document.getElementById('signatureSubmitBtn');
  const canvas = document.getElementById('sigCanvas');
  const signature = canvas.toDataURL('image/png');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const res = await fetch(`/api/invoices/${stop.invoice_id}/sign`, {
      method: 'POST',
      ...ah(),
      body: JSON.stringify({ signature }),
    });
    if (res.status === 401) { doLogout(); return; }
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Could not save signature');
    updateStopSignature(stop.id, {
      invoice_has_signature: true,
      invoice_signed_at: data.signed_at || new Date().toISOString(),
      invoice_status: data.status || 'signed',
    });
    closeSignatureModal();
    renderRoute();
    renderNotes();
    showToast(data.emailSent ? 'Signature saved and invoice emailed' : 'Signature saved');
  } catch (error) {
    showToast(error.message || 'Could not save signature');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Save Signature';
  }
}
function setLocationStatus(text, tone) {
  locationStatus = { text, tone };
  const el = document.getElementById('locationStatus');
  if (!el) return;
  el.textContent = text;
  el.className = `location-status${tone ? ' ' + tone : ''}`;
}
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

(function() {
  const canvas = document.getElementById('sigCanvas');
  if (!canvas) return;
  canvas.addEventListener('mousedown', sigStart);
  canvas.addEventListener('mousemove', sigMove);
  canvas.addEventListener('mouseup', sigEnd);
  canvas.addEventListener('mouseleave', sigEnd);
  canvas.addEventListener('touchstart', sigStart, { passive: false });
  canvas.addEventListener('touchmove', sigMove, { passive: false });
  canvas.addEventListener('touchend', sigEnd, { passive: false });
})();

document.getElementById('signatureModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeSignatureModal(); });

// ── AUTO-RESTORE SESSION ─────────────────────────────────────────────────────
(function() {
  const tok  = sessionStorage.getItem('drv_token') || localStorage.getItem('nr_token');
  const user = sessionStorage.getItem('drv_user') || localStorage.getItem('nr_user');
  if (!tok || !user) return;
  try {
    driverToken = tok;
    driverUser  = JSON.parse(user);
    if (!driverUser || driverUser.role !== 'driver') {
      sessionStorage.removeItem('drv_token');
      sessionStorage.removeItem('drv_user');
      localStorage.removeItem('nr_token');
      localStorage.removeItem('nr_user');
      window.location.href = '/dashboard';
      return;
    }
    sessionStorage.setItem('drv_token', driverToken);
    sessionStorage.setItem('drv_user', JSON.stringify(driverUser));
    enterApp();
  } catch {
    sessionStorage.clear();
    localStorage.removeItem('nr_token');
    localStorage.removeItem('nr_user');
  }
})();
</script>
