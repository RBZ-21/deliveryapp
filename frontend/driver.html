<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Driver — NodeRoute</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body{font-family:'Inter',system-ui,sans-serif;background:#050d2a;color:#fff;min-height:100vh;padding-bottom:20px}

    /* Header */
    .header{background:#0d1b3e;border-bottom:1px solid rgba(61,186,127,0.2);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    .brand{font-size:16px;font-weight:700;color:#3dba7f;letter-spacing:.5px}
    .driver-name{font-size:12px;color:#8899bb;margin-top:2px}
    .logout-btn{background:transparent;border:1px solid #1e3a6e;color:#8899bb;border-radius:8px;padding:6px 12px;font-size:12px;cursor:pointer;font-weight:500}
    .logout-btn:hover{border-color:#3dba7f;color:#3dba7f}

    /* Summary strip */
    .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:14px 18px}
    .stat{background:#0d1b3e;border:1px solid rgba(61,186,127,0.15);border-radius:12px;padding:12px 10px;text-align:center}
    .stat-val{font-size:22px;font-weight:800;color:#fff;line-height:1}
    .stat-val.green{color:#3dba7f}
    .stat-val.amber{color:#f59e0b}
    .stat-label{font-size:10px;color:#8899bb;margin-top:4px;text-transform:uppercase;letter-spacing:.6px}

    /* Section title */
    .section{padding:0 18px;margin-top:18px}
    .section-title{font-size:11px;color:#8899bb;text-transform:uppercase;letter-spacing:.8px;margin-bottom:10px;font-weight:600}

    /* Active stop card — big, prominent */
    .active-card{background:linear-gradient(135deg,#0d1b3e,#112654);border:2px solid #3dba7f;border-radius:16px;padding:20px;box-shadow:0 8px 24px rgba(61,186,127,0.15)}
    .active-badge{display:inline-block;background:#3dba7f;color:#0d1b3e;font-size:10px;font-weight:700;padding:3px 8px;border-radius:4px;letter-spacing:.6px;margin-bottom:12px}
    .active-badge.in-transit{background:#f59e0b;color:#0d1b3e}
    .stop-name{font-size:20px;font-weight:700;color:#fff;margin-bottom:6px;line-height:1.25}
    .stop-address{font-size:13px;color:#8899bb;line-height:1.4;margin-bottom:16px}
    .stop-meta{display:flex;gap:14px;font-size:12px;color:#8899bb;margin-bottom:16px}
    .stop-meta span{display:flex;align-items:center;gap:4px}
    .action-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
    .btn{padding:14px;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;transition:opacity .15s}
    .btn:active{opacity:.7}
    .btn-primary{background:linear-gradient(135deg,#3dba7f,#2ea06a);color:#fff}
    .btn-navigate{background:#1e3a6e;color:#fff;grid-column:1/-1}
    .btn-delivered{background:#3dba7f;color:#fff}
    .btn-failed{background:transparent;border:1px solid #ef4444;color:#ef4444}
    .btn-start{background:#f59e0b;color:#0d1b3e;grid-column:1/-1}

    /* Pending stops list */
    .stop-list{display:flex;flex-direction:column;gap:8px}
    .stop-item{background:#0d1b3e;border:1px solid #1e3a6e;border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px}
    .stop-num{width:28px;height:28px;border-radius:50%;background:#1e3a6e;color:#8899bb;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .stop-info{flex:1;min-width:0}
    .stop-item-name{font-size:14px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stop-item-addr{font-size:11px;color:#8899bb;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stop-time{font-size:11px;color:#8899bb;flex-shrink:0}

    /* Completed collapsible */
    .completed-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:6px 0;user-select:none}
    .completed-header .caret{color:#8899bb;font-size:12px;transition:transform .2s}
    .completed-header.open .caret{transform:rotate(180deg)}
    .completed-list{display:none;flex-direction:column;gap:8px;margin-top:10px}
    .completed-list.open{display:flex}
    .completed-item{background:rgba(13,27,62,0.5);border:1px solid #1e3a6e;border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;opacity:.7}
    .completed-item .stop-num{background:#3dba7f;color:#fff}
    .completed-item.failed .stop-num{background:#ef4444;color:#fff}

    /* Empty state */
    .empty{text-align:center;padding:40px 20px;color:#8899bb}
    .empty-icon{font-size:40px;margin-bottom:10px}
    .empty-title{font-size:16px;font-weight:600;color:#fff;margin-bottom:6px}
    .empty-sub{font-size:13px}

    /* Loading */
    .loading{text-align:center;padding:60px 20px;color:#8899bb;font-size:14px}

    /* Toast */
    .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#0d1b3e;border:1px solid #3dba7f;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;font-weight:500;box-shadow:0 8px 24px rgba(0,0,0,0.4);z-index:100;display:none}
    .toast.error{border-color:#ef4444}

    /* Failed modal */
    .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;align-items:flex-end;justify-content:center;z-index:50}
    .modal-bg.open{display:flex}
    .modal{background:#0d1b3e;border-top:1px solid rgba(61,186,127,0.2);border-radius:16px 16px 0 0;padding:24px 20px;width:100%;max-width:500px}
    .modal-title{font-size:16px;font-weight:700;color:#fff;margin-bottom:16px}
    .modal textarea{width:100%;min-height:80px;background:#050d2a;border:1px solid #1e3a6e;border-radius:10px;color:#fff;padding:12px;font-size:14px;font-family:inherit;resize:vertical;margin-bottom:16px;outline:none}
    .modal textarea:focus{border-color:#3dba7f}
    .modal-actions{display:flex;gap:10px}
    .btn-outline{background:transparent;border:1px solid #1e3a6e;color:#8899bb;flex:1;padding:14px;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="brand">NodeRoute</div>
      <div class="driver-name" id="driverName">—</div>
    </div>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>

  <div class="summary">
    <div class="stat"><div class="stat-val" id="stRemaining">—</div><div class="stat-label">Remaining</div></div>
    <div class="stat"><div class="stat-val green" id="stDone">—</div><div class="stat-label">Done</div></div>
    <div class="stat"><div class="stat-val amber" id="stOnTime">—</div><div class="stat-label">On time</div></div>
  </div>

  <div id="content">
    <div class="loading">Loading your stops…</div>
  </div>

  <!-- Failed reason modal -->
  <div class="modal-bg" id="failModal">
    <div class="modal">
      <div class="modal-title">Why did this fail?</div>
      <textarea id="failReason" placeholder="e.g. Closed, no one on site, wrong address…"></textarea>
      <div class="modal-actions">
        <button class="btn-outline" onclick="closeFailModal()">Cancel</button>
        <button class="btn btn-failed" style="flex:1" onclick="confirmFail()">Mark Failed</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
  const TOKEN = localStorage.getItem('nr_token');
  const USER  = JSON.parse(localStorage.getItem('nr_user') || 'null');
  if (!TOKEN || !USER) window.location.href = '/';
  if (USER && USER.role !== 'driver') window.location.href = '/dashboard';

  const authHeaders = { headers: { 'Authorization': 'Bearer ' + TOKEN } };
  let allDeliveries = [];
  let failTargetId = null;

  document.getElementById('driverName').textContent = USER?.name || '';

  async function fetchDeliveries() {
    try {
      const r = await fetch('/api/deliveries', authHeaders);
      if (r.status === 401) { logout(); return; }
      if (!r.ok) throw new Error('Failed to load deliveries');
      allDeliveries = await r.json();
      render();
    } catch(e) { toast(e.message, true); }
  }

  function render() {
    const remaining = allDeliveries.filter(d => d.status === 'pending' || d.status === 'in-transit');
    const completed = allDeliveries.filter(d => d.status === 'delivered' || d.status === 'failed');
    const delivered = completed.filter(d => d.status === 'delivered');
    const onTime = delivered.length ? Math.round(delivered.filter(d => d.onTime).length / delivered.length * 100) : 0;

    document.getElementById('stRemaining').textContent = remaining.length;
    document.getElementById('stDone').textContent = delivered.length;
    document.getElementById('stOnTime').textContent = delivered.length ? onTime + '%' : '—';

    // Active = first in-transit, else first pending
    const active = remaining.find(d => d.status === 'in-transit') || remaining[0];
    const rest   = remaining.filter(d => d !== active);

    const content = document.getElementById('content');
    if (!allDeliveries.length) {
      content.innerHTML = `<div class="empty"><div class="empty-icon">🛣️</div><div class="empty-title">No stops assigned</div><div class="empty-sub">Check back later or contact dispatch.</div></div>`;
      return;
    }
    if (!remaining.length) {
      content.innerHTML = `
        <div class="empty"><div class="empty-icon">✅</div><div class="empty-title">All stops complete</div><div class="empty-sub">Great work today.</div></div>
        ${renderCompleted(completed)}`;
      bindCollapsible();
      return;
    }

    content.innerHTML = `
      <div class="section">
        <div class="section-title">Next stop</div>
        ${renderActive(active)}
      </div>
      ${rest.length ? `
        <div class="section">
          <div class="section-title">Remaining (${rest.length})</div>
          <div class="stop-list">${rest.map((d, i) => renderPending(d, i + 2)).join('')}</div>
        </div>` : ''}
      ${renderCompleted(completed)}`;
    bindCollapsible();
  }

  function renderActive(d) {
    const inTransit = d.status === 'in-transit';
    return `
      <div class="active-card">
        <div class="active-badge ${inTransit ? 'in-transit' : ''}">${inTransit ? 'IN TRANSIT' : 'UP NEXT'}</div>
        <div class="stop-name">${escapeHtml(d.restaurant)}</div>
        <div class="stop-address">${escapeHtml(d.address)}</div>
        <div class="stop-meta">
          ${d.time ? `<span>🕒 ${d.time}</span>` : ''}
          ${d.distance ? `<span>📍 ${d.distance} mi</span>` : ''}
          ${d.stopDuration ? `<span>⏱ ~${d.stopDuration} min</span>` : ''}
        </div>
        <div class="action-grid">
          <button class="btn btn-navigate" onclick="navigateTo(${d.lat}, ${d.lng}, '${escapeAttr(d.address)}')">🧭 Navigate</button>
          ${inTransit ? `
            <button class="btn btn-delivered" onclick="markDelivered(${d.id})">✓ Delivered</button>
            <button class="btn btn-failed" onclick="openFailModal(${d.id})">Failed</button>
          ` : `
            <button class="btn btn-start" onclick="markInTransit(${d.id})">▶ Start this stop</button>
          `}
        </div>
      </div>`;
  }

  function renderPending(d, num) {
    return `
      <div class="stop-item" onclick="focusStop(${d.id})">
        <div class="stop-num">${num}</div>
        <div class="stop-info">
          <div class="stop-item-name">${escapeHtml(d.restaurant)}</div>
          <div class="stop-item-addr">${escapeHtml(d.address)}</div>
        </div>
        ${d.time ? `<div class="stop-time">${d.time}</div>` : ''}
      </div>`;
  }

  function renderCompleted(completed) {
    if (!completed.length) return '';
    return `
      <div class="section">
        <div class="completed-header" data-target="completedList">
          <div class="section-title" style="margin:0">Completed (${completed.length})</div>
          <span class="caret">▼</span>
        </div>
        <div class="completed-list" id="completedList">
          ${completed.map(d => `
            <div class="completed-item ${d.status === 'failed' ? 'failed' : ''}">
              <div class="stop-num">${d.status === 'failed' ? '✕' : '✓'}</div>
              <div class="stop-info">
                <div class="stop-item-name">${escapeHtml(d.restaurant)}</div>
                <div class="stop-item-addr">${d.status === 'failed' ? 'Failed' : 'Delivered'}${d.time ? ' · ' + d.time : ''}</div>
              </div>
            </div>`).join('')}
        </div>
      </div>`;
  }

  function bindCollapsible() {
    document.querySelectorAll('.completed-header').forEach(h => {
      h.onclick = () => {
        h.classList.toggle('open');
        document.getElementById(h.dataset.target).classList.toggle('open');
      };
    });
  }

  function focusStop(id) {
    // Scroll active card into view if user taps a pending item
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function navigateTo(lat, lng, address) {
    const url = (lat && lng)
      ? `https://www.google.com/maps/dir/?api=1&destination=${lat},${lng}`
      : `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(address)}`;
    window.open(url, '_blank');
  }

  async function updateStatus(id, status) {
    try {
      const r = await fetch(`/api/deliveries/${id}/status`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', ...authHeaders.headers },
        body: JSON.stringify({ status })
      });
      if (!r.ok) throw new Error('Update failed');
      await fetchDeliveries();
      return true;
    } catch(e) { toast(e.message, true); return false; }
  }

  async function markInTransit(id) {
    if (await updateStatus(id, 'in-transit')) toast('Stop started');
  }

  async function markDelivered(id) {
    if (await updateStatus(id, 'delivered')) toast('Marked delivered ✓');
  }

  function openFailModal(id) {
    failTargetId = id;
    document.getElementById('failReason').value = '';
    document.getElementById('failModal').classList.add('open');
  }

  function closeFailModal() {
    document.getElementById('failModal').classList.remove('open');
    failTargetId = null;
  }

  async function confirmFail() {
    if (failTargetId == null) return;
    const ok = await updateStatus(failTargetId, 'failed');
    closeFailModal();
    if (ok) toast('Marked failed');
  }

  function logout() {
    localStorage.removeItem('nr_token');
    localStorage.removeItem('nr_user');
    window.location.href = '/';
  }

  function toast(msg, isError) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.toggle('error', !!isError);
    el.style.display = 'block';
    clearTimeout(toast._t);
    toast._t = setTimeout(() => { el.style.display = 'none'; }, 2400);
  }

  function escapeHtml(s) { return String(s ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function escapeAttr(s) { return String(s ?? '').replace(/'/g, "\\'"); }

  fetchDeliveries();
  setInterval(fetchDeliveries, 30000);
  </script>
</body>
</html>
