name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build:
    name: Install, Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend-v2/package-lock.json
            landing-v2/package-lock.json

      # ---------- Backend ----------
      - name: Install backend
        run: npm --prefix backend install

      # ---------- Frontend-v2 ----------
      - name: Install frontend-v2
        run: npm --prefix frontend-v2 install --include=dev

      - name: Type-check frontend-v2
        run: npx --prefix frontend-v2 tsc --noEmit

      - name: Lint frontend-v2
        run: npm --prefix frontend-v2 run lint --if-present

      - name: Build frontend-v2
        run: npm --prefix frontend-v2 run build
        env:
          VITE_MAP_API_KEY: ''
          VITE_API_URL: https://ci-placeholder.invalid

      - name: Test frontend-v2
        run: npm --prefix frontend-v2 test -- --run --passWithNoTests
        continue-on-error: true

      # ---------- Landing-v2 ----------
      - name: Install landing-v2
        run: npm --prefix landing-v2 install --include=dev

      - name: Lint landing-v2
        run: npm --prefix landing-v2 run lint --if-present

      - name: Build landing-v2
        run: npm --prefix landing-v2 run build
        env:
          VITE_MAP_API_KEY: ''
