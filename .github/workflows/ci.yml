name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

defaults:
  run:
    working-directory: frontend-v2

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend-v2/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          # Sentry plugin is skipped when these are absent — safe for CI
          VITE_API_URL: https://ci-placeholder.invalid

      - name: Test
        run: npm test -- --run
